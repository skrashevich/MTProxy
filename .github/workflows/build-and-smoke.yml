name: Build and Smoke Test

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-smoke:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS ARM64
            os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify macOS runner architecture
        if: runner.os == 'macOS'
        run: test "$(uname -m)" = "arm64"

      - name: Run tests
        run: go test ./...

      - name: Build Go binary
        run: go build -trimpath -o mtproto-proxy ./cmd/mtproto-proxy

      - name: Smoke test binary
        shell: bash
        run: |
          set -euo pipefail
          BIN="./mtproto-proxy"
          test -x "$BIN"

          set +e
          "$BIN" --help >help.txt 2>&1
          code=$?
          set -e

          if [[ "$code" -ne 0 ]]; then
            cat help.txt
            echo "Unexpected exit code: $code"
            exit "$code"
          fi

          grep -Eq "Usage:|Simple MT-Proto proxy|mtproxy" help.txt
