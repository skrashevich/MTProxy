name: Nightly Release

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY="mtproto-proxy-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w" -o "${BINARY}" ./cmd/mtproto-proxy
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtproto-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            mtproto-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
            mtproto-proxy-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Delete previous nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create nightly dist/* \
            --title "Nightly $(date -u +%Y-%m-%d)" \
            --notes "Automated nightly build from \`master\` at $(git rev-parse --short HEAD)." \
            --prerelease
